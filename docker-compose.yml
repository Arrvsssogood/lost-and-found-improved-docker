version: '3.9'

services:

  web:
    build: .
    container_name: finders_keepers_web
    ports:
      - "5000:5000"

    env_file:
      - ./.env

    volumes:
      - ./app/static/uploads:/app/app/static/uploads

    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: finders_keepers_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: