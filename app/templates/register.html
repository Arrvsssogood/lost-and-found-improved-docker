{% extends "base.html" %}
{% block title %}Register — FindBack{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🎓</span>
            <h2>Create Account</h2>
            <p>Join the Finders Keepers community</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label><i class="fa fa-user"></i> Username</label>
                <input type="text" name="username" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label><i class="fa fa-envelope"></i> Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label><i class="fa fa-lock"></i> Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>

{% endblock %}
