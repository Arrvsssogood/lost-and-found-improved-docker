{% extends "base.html" %}
{% block title %}Login — FindBack{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="login-header">
            <a href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="FindBack Logo" class="login-logo">
            </a>
            <h2>Welcome Back</h2>
            <p>Log in to your FindBack account</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label><i class="fa fa-user"></i> Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label><i class="fa fa-lock"></i> Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        <p class="auth-hint"><em>Admin? Use your admin credentials.</em></p>
    </div>
</div>

{% endblock %}
