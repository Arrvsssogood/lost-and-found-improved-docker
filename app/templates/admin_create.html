{% extends "base.html" %}
{% block title %}Create Item — Admin{% endblock %}
{% block content %}

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-header"><span>⌖</span><strong>Admin Panel</strong></div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('admin_dashboard') }}" class="sidebar-link"><i class="fa fa-th-list"></i> All Items</a>
            <a href="{{ url_for('admin_create_item') }}" class="sidebar-link active"><i class="fa fa-plus-circle"></i> Create Item</a>
            <a href="{{ url_for('admin_users') }}" class="sidebar-link"><i class="fa fa-users"></i> Manage Users</a>
            <a href="{{ url_for('gallery') }}" class="sidebar-link"><i class="fa fa-eye"></i> View Gallery</a>
            <a href="{{ url_for('logout') }}" class="sidebar-link sidebar-logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>
    <div class="admin-main">
        <div class="admin-topbar">
            <h1>Create New Item</h1>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline"><i class="fa fa-arrow-left"></i> Back</a>
        </div>
        <div class="form-card" style="max-width: 700px;">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label>Title <span class="required">*</span></label>
                        <input type="text" name="title" placeholder="Item title" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select name="item_type">
                            <option value="found">Found</option>
                            <option value="lost">Lost</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category">
                            {% for cat in ['Gadgets', 'Keys/Wallet', 'Documents', 'Clothing', 'Accessories', 'Other'] %}
                            <option>{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Initial Status</label>
                        <select name="status">
                            <option value="approved">Approved (Public)</option>
                            <option value="pending">Pending</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Location <span class="required">*</span></label>
                    <input type="text" name="location" placeholder="Where was it found/lost?" required>
                </div>
                <div class="form-group">
                    <label>Date Found</label>
                    <input type="date" name="date_found">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="4" placeholder="Describe the item..."></textarea>
                </div>
                <div class="form-group">
                    <label>Upload Photo (optional)</label>
                    <input type="file" name="image" accept="image/*">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"><i class="fa fa-plus"></i> Create Item</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
